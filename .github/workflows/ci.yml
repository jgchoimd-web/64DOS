name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc binutils qemu-system-x86 mtools make python3
      - name: Check toolchain
        run: make check-tools
      - name: Build floppy image
        run: make
      - name: Validate image and host FAT12 parser
        run: make test
      - name: QEMU BIOS smoke test
        run: make smoke

